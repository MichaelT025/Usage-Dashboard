<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Usage Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>LLM Usage</h1>
    <div class="header-actions">
      <span id="last-updated" class="last-updated"></span>
      <button id="refresh-btn" class="btn-refresh">↻ Refresh</button>
      <button id="settings-btn" class="btn-settings" title="Settings">⚙</button>
    </div>
  </header>
  <main id="providers-grid" class="providers-grid">
    <div class="loading">Loading...</div>
  </main>
  <!-- Settings modal placeholder — wired by T15 -->
  <div id="settings-modal" class="modal hidden"></div>
  <script src="app.js" type="module"></script>
</body>
</html>
